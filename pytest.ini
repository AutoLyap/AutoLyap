[pytest]
testpaths = tests
python_files = test_*.py
addopts = -rs
markers =
    mosek: tests that require MOSEK and a valid license
    sdpa: tests that require CVXPY+SDPA regular precision profile
    sdpa_multiprecision: tests that require CVXPY+SDPA multiprecision profile
    public_api: tests that validate user-facing public behavior
    private_api: tests that validate internal/private implementation details
