name: docs

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"

jobs:
  build:
    name: build-docs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            docs/requirements.txt
      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt
      - name: Build docs
        run: |
          make -C docs dirhtml
          touch docs/build/dirhtml/.nojekyll
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-dirhtml
          path: docs/build/dirhtml/
          if-no-files-found: error

  publish:
    name: publish-docs
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    steps:
      - name: Download built docs
        uses: actions/download-artifact@v4
        with:
          name: docs-dirhtml
          path: built-docs
      - name: Require docs deploy token
        shell: bash
        env:
          AUTOLYAP_GH_PAGES_TOKEN: ${{ secrets.AUTOLYAP_GH_PAGES_TOKEN }}
        run: |
          if [ -n "$AUTOLYAP_GH_PAGES_TOKEN" ]; then
            echo "AUTOLYAP_GH_PAGES_TOKEN detected."
          else
            echo "AUTOLYAP_GH_PAGES_TOKEN is required to push docs to AutoLyap/AutoLyap.github.io." >&2
            exit 1
          fi
      - name: Checkout docs site repository
        uses: actions/checkout@v4
        with:
          repository: AutoLyap/AutoLyap.github.io
          token: ${{ secrets.AUTOLYAP_GH_PAGES_TOKEN }}
          path: site
      - name: Sync built docs
        run: rsync -a --delete --exclude '.git/' built-docs/ site/
      - name: Commit and push docs updates
        working-directory: site
        env:
          SOURCE_SHA: ${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No documentation changes to publish."
            exit 0
          fi
          git add -A
          git commit -m "docs: publish ${SOURCE_SHA::7}"
          git push
