name: tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff
      - name: Run lint
        run: python -m ruff check autolyap tests setup.py --select E9,F63,F7,F82

  typecheck:
    name: typecheck (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            setup.py
      - name: Install typecheck dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install mypy
      - name: Run typecheck
        run: |
          python -m mypy \
            autolyap/solver_options.py \
            autolyap/problemclass \
            --ignore-missing-imports \
            --follow-imports=silent

  pytest-core:
    name: pytest-core (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            setup.py
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test]
      - name: Run core test suite
        run: python -m pytest -m "not mosek"

  pytest-mosek:
    name: pytest-mosek (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            setup.py
      - name: Require MOSEK secret availability
        shell: bash
        env:
          MOSEK_LICENSE: ${{ secrets.MOSEK_LICENSE }}
        run: |
          if [ -n "$MOSEK_LICENSE" ]; then
            echo "MOSEK_LICENSE detected."
          else
            echo "MOSEK_LICENSE is required for strict MOSEK validation." >&2
            exit 1
          fi
      - name: Install MOSEK test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test,mosek]
      - name: Prepare MOSEK license file
        shell: bash
        env:
          MOSEK_LICENSE: ${{ secrets.MOSEK_LICENSE }}
        run: |
          printf '%s' "$MOSEK_LICENSE" > "$RUNNER_TEMP/mosek.lic"
          echo "MOSEKLM_LICENSE_FILE=$RUNNER_TEMP/mosek.lic" >> "$GITHUB_ENV"
      - name: Run MOSEK test suite
        env:
          AUTOLYAP_STRICT_MOSEK: "1"
          PYTEST_MOSEK_REPORT: ${{ runner.temp }}/pytest-mosek.xml
        run: |
          python -m pytest -m "mosek" --junitxml "$PYTEST_MOSEK_REPORT"
          python - <<'PY'
          import os
          import sys
          import xml.etree.ElementTree as ET

          report_path = os.environ["PYTEST_MOSEK_REPORT"]
          root = ET.parse(report_path).getroot()
          if root.tag == "testsuite":
              skipped = int(root.attrib.get("skipped", 0))
          else:
              skipped = sum(int(suite.attrib.get("skipped", 0)) for suite in root.findall("testsuite"))
          if skipped:
              print(
                  f"MOSEK CI requires executed tests; found {skipped} skipped MOSEK tests.",
                  file=sys.stderr,
              )
              sys.exit(1)
          print("MOSEK suite completed with zero skipped tests.")
          PY
