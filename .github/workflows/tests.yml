name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test]
      - name: Prepare MOSEK license file
        shell: bash
        run: |
          printf '%s' "${{ secrets.MOSEK_LICENSE }}" > "$RUNNER_TEMP/mosek.lic"
          echo "MOSEKLM_LICENSE_FILE=$RUNNER_TEMP/mosek.lic" >> "$GITHUB_ENV"
      - name: Run tests
        run: python -m pytest
