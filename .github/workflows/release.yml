name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: verify (pytest, 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            setup.py
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test,mosek]
      - name: Require MOSEK secret availability
        shell: bash
        env:
          MOSEK_LICENSE: ${{ secrets.MOSEK_LICENSE }}
        run: |
          if [ -n "$MOSEK_LICENSE" ]; then
            echo "MOSEK_LICENSE detected."
          else
            echo "MOSEK_LICENSE is required for release verification." >&2
            exit 1
          fi
      - name: Prepare MOSEK license file
        shell: bash
        env:
          MOSEK_LICENSE: ${{ secrets.MOSEK_LICENSE }}
        run: |
          printf '%s' "$MOSEK_LICENSE" > "$RUNNER_TEMP/mosek.lic"
          echo "MOSEKLM_LICENSE_FILE=$RUNNER_TEMP/mosek.lic" >> "$GITHUB_ENV"
      - name: Validate MOSEK license
        run: |
          python - <<'PY'
          import mosek.fusion as mf

          with mf.Model() as model:
              x = model.variable(1, mf.Domain.greaterThan(0.0))
              model.objective(mf.ObjectiveSense.Minimize, x)
              model.solve()
          print("MOSEK license check passed.")
          PY
      - name: Run full test suite
        env:
          AUTOLYAP_STRICT_MOSEK: "1"
        run: python -m pytest -m "not scs and not copt and not sdpa and not sdpa_multiprecision"

  build-and-release:
    name: build-and-release
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Sync CITATION.cff version from VERSION
        run: python scripts/sync_citation_version.py
      - name: Validate tag matches VERSION
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(cat VERSION)"
          if [ "$tag_version" != "$package_version" ]; then
            echo "Tag version ($tag_version) does not match VERSION ($package_version)."
            exit 1
          fi
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
      - name: Upload release distributions
        uses: actions/upload-artifact@v6
        with:
          name: release-dist
          path: dist/*
      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.whl

  publish-pypi:
    name: publish-pypi
    runs-on: ubuntu-latest
    needs: build-and-release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/autolyap
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v8
        with:
          name: release-dist
          path: dist
      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  publish-docs:
    name: publish-docs
    runs-on: ubuntu-latest
    needs: publish-pypi
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            docs/requirements.txt
      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt
      - name: Build docs
        run: |
          make -C docs dirhtml
          touch docs/build/dirhtml/.nojekyll
      - name: Require docs deploy token
        shell: bash
        env:
          AUTOLYAP_GH_PAGES_TOKEN: ${{ secrets.AUTOLYAP_GH_PAGES_TOKEN }}
        run: |
          if [ -n "$AUTOLYAP_GH_PAGES_TOKEN" ]; then
            echo "AUTOLYAP_GH_PAGES_TOKEN detected."
          else
            echo "AUTOLYAP_GH_PAGES_TOKEN is required to push docs to AutoLyap/AutoLyap.github.io." >&2
            exit 1
          fi
      - name: Checkout docs site repository
        uses: actions/checkout@v5
        with:
          repository: AutoLyap/AutoLyap.github.io
          token: ${{ secrets.AUTOLYAP_GH_PAGES_TOKEN }}
          path: site
      - name: Sync built docs
        run: rsync -a --delete --exclude '.git/' docs/build/dirhtml/ site/
      - name: Commit and push docs updates
        working-directory: site
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No documentation changes to publish."
            exit 0
          fi
          git add -A
          git commit -m "docs: publish ${RELEASE_TAG}"
          git push
